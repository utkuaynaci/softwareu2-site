<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U2 Software</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Logo Alanı */
        .logo-container {
            margin-bottom: 25px;
            text-align: center;
        }

        .logo-container img {
            max-width: 1000px; /* Logonuzun ekrandaki genişliğini buradan ayarlayabilirsiniz */
            height: auto;
            display: block;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.1rem;
            color: #a0a0a0;
            margin-bottom: 35px;
        }

        /* Dönme Animasyonu (Loader) */
        .loader {
            border: 4px solid #000000;
            border-top: 4px solid ##12870e;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" alt="Sitemizin Logosu">
    </div>

    <div class="loader"></div>
    <h1> </h1>
    <p> </p>

</body>
</html>
